<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>能做吗？勇哥 · 方图</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: #000; color: #fff; position: relative; overflow: hidden;
  }
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 20%, #dc2626 0%, transparent 50%),
      repeating-linear-gradient(45deg, #111 0 20px, #0a0a0a 20px 40px);
  }
  .card {
    position: absolute; inset: 48px;
    border: 10px solid #facc15;
    box-shadow: 0 0 0 10px #000, 0 0 0 20px #b91c1c;
    background: linear-gradient(180deg, #1c1917 0%, #000 100%);
    padding: 56px 48px;
  }
  .kicker {
    display: inline-block; background: #facc15; color: #000;
    font-weight: 900; font-size: 28px; padding: 10px 18px;
    transform: rotate(-2deg); margin-bottom: 36px;
  }
  h1 {
    font-size: 120px; font-weight: 900; line-height: .95;
    text-shadow: 8px 8px 0 #b91c1c;
  }
  h1 span { color: #facc15; display: block; font-size: 100px; margin-top: 12px; }
  ul {
    margin-top: 48px; list-style: none; font-size: 36px; font-weight: 900;
    line-height: 1.7;
  }
  li::before { content: "▶ "; color: #ef4444; }
  .bottom {
    position: absolute; left: 48px; right: 48px; bottom: 48px;
    background: #b91c1c; color: #fff; font-size: 40px; font-weight: 900;
    text-align: center; padding: 28px; border: 6px solid #fff;
    box-shadow: 10px 10px 0 #000;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="kicker">餐饮创业反诈天花板 Skill</div>
    <h1>能做吗？<span>勇哥</span></h1>
    <ul>
      <li>拍门头 = 验铺</li>
      <li>高德 / 百度喂数据</li>
      <li>勇哥方法论判死刑</li>
      <li>该劝退绝不手软</li>
    </ul>
    <div class="bottom">别用全家积蓄给房东送钱</div>
  </div>
</body>
</html>
