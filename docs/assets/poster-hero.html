<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>能做吗？勇哥</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: #070707;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, #7f1d1d 0%, transparent 45%),
      radial-gradient(circle at 85% 70%, #854d0e 0%, transparent 40%),
      linear-gradient(135deg, #0a0a0a, #1a0505 60%, #000);
  }
  .stripe {
    position: absolute; top: 42px; left: -40px; right: -40px;
    background: repeating-linear-gradient(
      -12deg, #facc15 0 28px, #111 28px 56px
    );
    height: 46px;
    transform: rotate(-2deg);
    border: 4px solid #000;
    box-shadow: 0 8px 0 #000;
  }
  .stripe span {
    display: block; text-align: center; line-height: 38px;
    font-weight: 900; font-size: 22px; letter-spacing: 6px;
    color: #000; mix-blend-mode: multiply;
  }
  .main {
    position: relative; z-index: 2;
    padding: 120px 64px 40px;
  }
  h1 {
    font-size: 96px; font-weight: 900; line-height: 1.05;
    letter-spacing: 2px;
    text-shadow: 6px 6px 0 #b91c1c, 12px 12px 0 #000;
  }
  h1 em {
    font-style: normal; color: #facc15;
    text-shadow: 6px 6px 0 #b45309, 12px 12px 0 #000;
  }
  .sub {
    margin-top: 28px; font-size: 34px; font-weight: 700;
    color: #fecaca; max-width: 900px; line-height: 1.35;
  }
  .row {
    margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap;
  }
  .tag {
    font-size: 22px; font-weight: 900; padding: 12px 20px;
    border: 4px solid #fff; background: #b91c1c;
    box-shadow: 6px 6px 0 #000; transform: rotate(-1.5deg);
  }
  .tag.y { background: #facc15; color: #000; transform: rotate(1.5deg); }
  .tag.g { background: #16a34a; transform: rotate(-0.5deg); }
  .stamp {
    position: absolute; right: 50px; bottom: 40px;
    width: 220px; height: 220px; border: 10px solid #ef4444;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #ef4444; font-size: 42px; font-weight: 900; text-align: center;
    line-height: 1.15; transform: rotate(-18deg);
    box-shadow: inset 0 0 0 6px #7f1d1d, 0 0 40px rgba(239,68,68,.45);
    background: rgba(0,0,0,.35);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="stripe"><span>⚠ 开店前必看 · 劝退也是救命 · 别用血汗钱交学费 ⚠</span></div>
  <div class="main">
    <h1>能做吗？<em>勇哥</em></h1>
    <p class="sub">拍一张门头，3 分钟骂醒你。<br/>位置烂 / 业态错 / 加盟坑 —— 该红就红，绝不灌鸡汤。</p>
    <div class="row">
      <div class="tag">🔴 做不了</div>
      <div class="tag y">🟡 谨慎</div>
      <div class="tag g">🟢 罕见能做</div>
    </div>
  </div>
  <div class="stamp">勇哥<br/>说做不了</div>
</body>
</html>
